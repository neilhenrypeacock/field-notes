<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" width="140" height="80">
  <!-- Sun arc behind clouds -->
  <circle cx="100" cy="32" r="22" fill="#E8CC7A" opacity="0.3"/>
  <circle cx="100" cy="32" r="16" fill="#D4A843" opacity="0.2"/>
  <!-- Cloud mass - overlapping circles -->
  <circle cx="46" cy="28" r="18" fill="#9BBFDF" opacity="0.4"/>
  <circle cx="66" cy="24" r="22" fill="#C5DCF0" opacity="0.45"/>
  <circle cx="84" cy="28" r="16" fill="#9BBFDF" opacity="0.35"/>
  <circle cx="56" cy="22" r="14" fill="#C5DCF0" opacity="0.3"/>
  <circle cx="74" cy="20" r="12" fill="#9BBFDF" opacity="0.25"/>
  <!-- Rain drops - soft vertical ellipses -->
  <ellipse cx="48" cy="54" rx="3" ry="10" fill="#9BBFDF" opacity="0.35"/>
  <ellipse cx="60" cy="58" rx="2.5" ry="9" fill="#C5DCF0" opacity="0.3"/>
  <ellipse cx="72" cy="52" rx="3" ry="11" fill="#9BBFDF" opacity="0.3"/>
  <ellipse cx="84" cy="56" rx="2.5" ry="8" fill="#C5DCF0" opacity="0.25"/>
  <!-- Light wash at base -->
  <ellipse cx="66" cy="70" rx="40" ry="6" fill="#C5DCF0" opacity="0.12"/>
</svg>