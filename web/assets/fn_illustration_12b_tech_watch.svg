<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" width="140" height="80">
  <!-- Soft background -->
  <ellipse cx="70" cy="40" rx="62" ry="30" fill="#8FBF96" opacity="0.08"/>
  <!-- Circuit board trace lines — horizontal -->
  <line x1="20" y1="30" x2="60" y2="30" stroke="#8FBF96" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="30" x2="120" y2="30" stroke="#8FBF96" stroke-width="2" opacity="0.4"/>
  <line x1="20" y1="50" x2="55" y2="50" stroke="#D4A843" stroke-width="2" opacity="0.4"/>
  <line x1="85" y1="50" x2="120" y2="50" stroke="#D4A843" stroke-width="2" opacity="0.4"/>
  <!-- Vertical connectors -->
  <line x1="60" y1="30" x2="60" y2="50" stroke="#8FBF96" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="30" x2="80" y2="50" stroke="#D4A843" stroke-width="2" opacity="0.35"/>
  <!-- Central chip/node -->
  <rect x="60" y="25" width="20" height="30" rx="4" fill="#1b3a2d" opacity="0.25"/>
  <rect x="63" y="28" width="14" height="24" rx="3" fill="#8FBF96" opacity="0.3"/>
  <!-- Node dots -->
  <circle cx="20" cy="30" r="3" fill="#8FBF96" opacity="0.5"/>
  <circle cx="120" cy="30" r="3" fill="#8FBF96" opacity="0.5"/>
  <circle cx="20" cy="50" r="3" fill="#D4A843" opacity="0.5"/>
  <circle cx="120" cy="50" r="3" fill="#D4A843" opacity="0.5"/>
  <circle cx="55" cy="50" r="3" fill="#D4A843" opacity="0.5"/>
  <circle cx="85" cy="50" r="3" fill="#D4A843" opacity="0.5"/>
</svg>
