<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 80" width="140" height="80">
  <!-- Outer radiating arcs -->
  <ellipse cx="70" cy="40" rx="55" ry="35" fill="#C5DCF0" opacity="0.12"/>
  <ellipse cx="70" cy="40" rx="45" ry="28" fill="#B5D4B8" opacity="0.15"/>
  <!-- Radiating rays - sage and sky -->
  <ellipse cx="30" cy="40" rx="18" ry="8" fill="#8FBF96" opacity="0.2" transform="rotate(-15 30 40)"/>
  <ellipse cx="110" cy="40" rx="18" ry="8" fill="#9BBFDF" opacity="0.2" transform="rotate(15 110 40)"/>
  <ellipse cx="50" cy="16" rx="16" ry="7" fill="#9BBFDF" opacity="0.2" transform="rotate(-40 50 16)"/>
  <ellipse cx="90" cy="16" rx="16" ry="7" fill="#8FBF96" opacity="0.18" transform="rotate(40 90 16)"/>
  <ellipse cx="50" cy="64" rx="16" ry="7" fill="#8FBF96" opacity="0.18" transform="rotate(40 50 64)"/>
  <ellipse cx="90" cy="64" rx="16" ry="7" fill="#9BBFDF" opacity="0.18" transform="rotate(-40 90 64)"/>
  <!-- Central sun/rosette -->
  <circle cx="70" cy="40" r="22" fill="#E8CC7A" opacity="0.4"/>
  <circle cx="70" cy="40" r="16" fill="#D4A843" opacity="0.35"/>
  <circle cx="70" cy="40" r="10" fill="#E8CC7A" opacity="0.4"/>
  <circle cx="70" cy="40" r="5" fill="#D4A843" opacity="0.25"/>
</svg>