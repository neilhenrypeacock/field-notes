  <rect x="40" y="32" width="60" height="22" rx="6" fill="#B8956A" opacity="0.22"/>
  <!-- Cab suggestion -->
  <rect x="78" y="16" width="24" height="22" rx="5" fill="#A08060" opacity="0.35"/>
  <rect x="82" y="20" width="16" height="14" rx="3" fill="#E8CC7A" opacity="0.2"/>
  <!-- Large wheel - left -->
  <circle cx="50" cy="60" r="16" fill="#A08060" opacity="0.45"/>
  <circle cx="50" cy="60" r="11" fill="#B8956A" opacity="0.3"/>
  <circle cx="50" cy="60" r="5" fill="#A08060" opacity="0.25"/>
  <!-- Small wheel - right -->
  <circle cx="96" cy="62" r="10" fill="#A08060" opacity="0.4"/>
  <circle cx="96" cy="62" r="6" fill="#B8956A" opacity="0.25"/>
  <circle cx="96" cy="62" r="3" fill="#A08060" opacity="0.2"/>
